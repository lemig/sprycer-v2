{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Sprycer{% endblock %}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; background: #f7f7f7; color: #222; }
  header { background: #d8232a; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 22px; }
  header nav a { color: #fff; text-decoration: none; margin-left: 24px; font-weight: 500; }
  header nav a:hover { text-decoration: underline; }
  main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
  h1 { font-size: 22px; margin: 0 0 16px; }
  table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
  th { background: #fafafa; font-weight: 600; color: #555; }
  tr:hover td { background: #fdf3f4; }
  .btn { display: inline-block; padding: 6px 12px; border-radius: 4px; border: 1px solid #d8232a; color: #d8232a; text-decoration: none; background: #fff; cursor: pointer; font-size: 13px; }
  .btn:hover { background: #d8232a; color: #fff; }
  .btn-primary { background: #d8232a; color: #fff; }
  .btn-primary:hover { background: #b51c22; }
  .alert { padding: 10px 14px; border-radius: 4px; background: #fff8e1; border: 1px solid #f4d97a; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; padding: 14px; border: 1px solid #eee; border-radius: 4px; }
  .card .sku { font-family: ui-monospace, monospace; color: #666; font-size: 12px; }
  .card .price { font-weight: 600; color: #d8232a; }
  form.inline { display: inline; }
  input[type=text], input[type=file], select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .toolbar { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
  .empty { padding: 32px; text-align: center; color: #999; }
</style>
<script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
<header>
  <div class="logo">SPRYCER</div>
  <nav>
    {% if user.is_authenticated %}
      <a href="{% url 'imports:list' %}">Imports</a>
      <a href="{% url 'exports:list' %}">Exports</a>
      <a href="{% url 'matchings:list' %}">Matchings</a>
      <a href="/admin/">Admin</a>
      <form method="post" action="{% url 'logout' %}" class="inline">{% csrf_token %}<button class="btn" style="border-color:#fff;color:#fff;background:transparent;">Sign out ({{ user.username }})</button></form>
    {% else %}
      <a href="{% url 'login' %}">Sign in</a>
    {% endif %}
  </nav>
</header>
<main>
  {% if messages %}{% for m in messages %}<div class="alert">{{ m }}</div>{% endfor %}{% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
